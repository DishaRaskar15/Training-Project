<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopSphere – Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">🛒 ShopSphere</div>
      <p class="tagline">Create your account</p>

      <form id="registerForm">
        <div class="input-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" placeholder="John Doe" required />
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" required />
          <span class="toggle-pass" onclick="togglePassword('password')">👁</span>
        </div>
        <div class="input-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" placeholder="Repeat password" required />
          <span class="toggle-pass" onclick="togglePassword('confirm_password')">👁</span>
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        <button type="submit" class="btn-login" id="registerBtn">Create Account</button>
      </form>

      <div class="divider">or</div>
      <button class="btn-register" onclick="window.location.href='index.html'">Already have an account? Login</button>
    </div>
  </div>
  <script src="register.js"></script>
</body>
</html>
